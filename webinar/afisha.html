<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#0A0A0A;--red:#E10A17;--paper:#fff}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:var(--paper);font-family:'Space Grotesk',sans-serif;color:var(--ink);position:relative}
  .frame{position:absolute;inset:0;padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between}
  .stripe{position:absolute;top:0;right:0;width:46%;height:100%;
    background-image:repeating-linear-gradient(-45deg,var(--red) 0,var(--red) 2px,transparent 2px,transparent 12px);opacity:.10}
  .kick{font-family:'Space Mono',monospace;font-size:19px;letter-spacing:.34em;text-transform:uppercase;display:flex;align-items:center;gap:18px}
  .kick b{color:var(--red);font-weight:700;letter-spacing:.05em}
  .kick .rule{flex:1;height:3px;background:var(--ink);max-width:180px}
  .mid{display:flex;align-items:flex-end;justify-content:space-between;gap:30px;flex:1;padding:26px 0}
  .title{font-family:'Archivo Black',sans-serif;text-transform:uppercase;line-height:.94;letter-spacing:-.015em;font-size:92px}
  .title .r{color:var(--red)}
  .date{display:inline-block;margin-top:26px;background:var(--red);color:#fff;font-family:'Archivo Black',sans-serif;
    text-transform:uppercase;font-size:30px;letter-spacing:.01em;padding:14px 22px;box-shadow:9px 9px 0 var(--ink)}
  .photo{flex:0 0 300px;height:360px;border:4px solid var(--ink);box-shadow:12px 12px 0 var(--red);
    background:#eee center/cover no-repeat;filter:grayscale(1) contrast(1.05)}
  .foot{display:flex;align-items:center;justify-content:space-between;border-top:4px solid var(--ink);padding-top:22px}
  .brand{font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:26px;letter-spacing:.02em}
  .brand span{color:var(--red)}
  .meta{font-family:'Space Mono',monospace;font-size:17px;letter-spacing:.24em;text-transform:uppercase}
  .meta b{color:var(--red)}
</style>
</head>
<body>
  <div class="stripe"></div>
  <div class="frame">
    <div class="kick"><span>Онлайн-вебинар</span><span class="rule"></span><b>Бесплатно</b></div>
    <div class="mid">
      <div>
        <div class="title">ИИ —<br>ЭКЗО<span class="r">СКЕЛЕТ</span><br>ДЛЯ ФАУНДЕРА</div>
        <div class="date">23 июля · 19:00 МСК</div>
      </div>
      <div class="photo" style="background-image:url('tim.jpg')"></div>
    </div>
    <div class="foot">
      <div class="brand">ЗИНИН <span>×</span> САРАПУЛОВ</div>
      <div class="meta">ZOOM · <b>регистрация в боте</b></div>
    </div>
  </div>
</body>
</html>
